<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🏥 Diabetes Prediction</h1>
        <p class="subtitle">Using KNN Binary Classification Model</p>

        <form id="predictionForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="pregnancies">Pregnancies (times)</label>
                    <input type="number" id="pregnancies" name="pregnancies" min="0" max="20" required>
                </div>
                <div class="form-group">
                    <label for="glucose">Glucose (mg/dL)</label>
                    <input type="number" id="glucose" name="glucose" min="0" max="300" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="bloodPressure">Blood Pressure (mmHg)</label>
                    <input type="number" id="bloodPressure" name="bloodPressure" min="0" max="200" required>
                </div>
                <div class="form-group">
                    <label for="skinThickness">Skin Thickness (mm)</label>
                    <input type="number" id="skinThickness" name="skinThickness" min="0" max="100" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="insulin">Insulin (mU/L)</label>
                    <input type="number" id="insulin" name="insulin" min="0" max="900" required>
                </div>
                <div class="form-group">
                    <label for="bmi">BMI (kg/m²)</label>
                    <input type="number" id="bmi" name="bmi" min="0" max="70" step="0.1" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="dpf">Diabetes Pedigree Function</label>
                    <input type="number" id="dpf" name="dpf" min="0" max="3" step="0.001" required>
                </div>
                <div class="form-group">
                    <label for="age">Age (years)</label>
                    <input type="number" id="age" name="age" min="0" max="150" required>
                </div>
            </div>

            <button type="submit">Predict</button>
        </form>

        <div class="loading" id="loading">
            ⏳ Processing prediction...
        </div>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <h2>📊 Prediction Result</h2>
            <div class="result-item">
                <strong>Classification:</strong> <span id="predictionLabel" class="prediction-positive">Diabetic</span>
            </div>
            <div class="result-item">
                <strong>Prediction Value:</strong> <span id="predictionValue">0</span>
            </div>
            <div class="result-item probability">
                <strong>Confidence:</strong> <span id="probabilityValue">0.00%</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
